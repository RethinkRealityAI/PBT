# PBT (Pushback Training) — https://github.com/RethinkRealityAI/PBT
# In Netlify: Site configuration → Environment variables, set at least:
#   GEMINI_API_KEY              — required; Vite inlines it at build (see vite.config.ts)
#   VITE_SUPABASE_URL          — optional (account sync)
#   VITE_SUPABASE_PUBLISHABLE_KEY — optional
#
# `npm ci` uses package-lock.json for reproducible Netlify builds.

[build]
  command   = "npm ci && npm run build"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — all routes serve index.html so React handles routing
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
