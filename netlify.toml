# PBT (Pushback Training) — https://github.com/RethinkRealityAI/PBT
# In Netlify: Site configuration → Environment variables, set at least:
#   GEMINI_API_KEY                  — required; Vite inlines it at build
#   VITE_SUPABASE_URL              — required for cloud sync + admin dashboard
#   VITE_SUPABASE_PUBLISHABLE_KEY  — required (anon key, browser-side)
#   SUPABASE_SERVICE_ROLE_KEY      — required by admin Netlify Functions only;
#                                    never exposed to the client
#
# `npm ci` uses package-lock.json for reproducible Netlify builds.

[build]
  command   = "npm ci && npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Admin SPA fallback — /admin and /admin/anything serves admin.html.
# Must come before the global SPA fallback so it wins.
[[redirects]]
  from   = "/admin"
  to     = "/admin.html"
  status = 200
[[redirects]]
  from   = "/admin/*"
  to     = "/admin.html"
  status = 200

# Consumer SPA fallback — every other route serves index.html.
# Netlify Functions (under /.netlify/functions/*) are not rewritten.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
