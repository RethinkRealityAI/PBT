<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PBT Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Mulish:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --pbt-font: 'Mulish', system-ui, sans-serif;
        --pbt-mono: 'Geist Mono', ui-monospace, monospace;
      }
      html, body, #root { margin: 0; padding: 0; min-height: 100vh; }
      body {
        background: #fcf9f7;
        font-family: var(--pbt-font);
        -webkit-font-smoothing: antialiased;
        color: oklch(0.20 0.04 20);
      }
      *, *::before, *::after { box-sizing: border-box; }
      button { font-family: inherit; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
