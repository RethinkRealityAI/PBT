var pfx='ln_energizer_';
var els=[0,1,2,3].map(function(i){return document.getElementById(pfx+i)});
function lerp(a,b,t){return a+(b-a)*t}
function getFrame(t){
  t=t%DUR;var i=0;
  for(;i<K.length-1;i++){if(K[i+1][0]>t)break}
  var ka=K[i],kb=K[Math.min(i+1,K.length-1)];
  var dt=kb[0]-ka[0],u=dt>0?(t-ka[0])/dt:0;
  var s=[],p=[];
  for(var j=0;j<N;j++){s.push(lerp(ka[1+j],kb[1+j],u));p.push(lerp(ka[1+N+j],kb[1+N+j],u));}
  return{s:s,p:p};
}
function path(pts){
  var d='M'+pts[0][0].toFixed(1)+','+pts[0][1].toFixed(1);
  for(var i=0;i<pts.length-1;i++){
    var p0=pts[Math.max(0,i-1)],p1=pts[i],p2=pts[i+1],p3=pts[Math.min(pts.length-1,i+2)];
    d+=' C'+(p1[0]+(p2[0]-p0[0])/6).toFixed(1)+','+(p1[1]+(p2[1]-p0[1])/6).toFixed(1)
      +' '+(p2[0]-(p3[0]-p1[0])/6).toFixed(1)+','+(p2[1]-(p3[1]-p1[1])/6).toFixed(1)
      +' '+p2[0].toFixed(1)+','+p2[1].toFixed(1);
  }
  return d;
}
var start=null,raf=null;
function tick(ts){
  if(!start)start=ts;
  var fr=getFrame((ts-start)/1000);
  for(var li=0;li<4;li++){
    var pts=[];
    for(var j=0;j<N;j++){pts.push([X[j],fr.s[j]+off[li]*fr.p[j]]);}
    els[li].setAttribute('d',path(pts));
  }
  raf=requestAnimationFrame(tick);
}
if(typeof IntersectionObserver!=='undefined'){
  new IntersectionObserver(function(e){
    if(e[0].isIntersecting){if(!raf)requestAnimationFrame(function(ts){start=ts;tick(ts)})}
    else{cancelAnimationFrame(raf);raf=null;start=null}
  }).observe(els[0].closest('svg'));
}else{requestAnimationFrame(tick)}
