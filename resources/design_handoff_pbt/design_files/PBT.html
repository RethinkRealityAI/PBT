<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>PBT — Pushback Training</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=Mulish:wght@400;500;600;700;800&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root { --pbt-font: 'Mulish', 'Geist', system-ui, sans-serif; }
  html, body { margin: 0; padding: 0; background: #fff7f5; font-family: var(--pbt-font); -webkit-font-smoothing: antialiased; }
  * { box-sizing: border-box; }
  #root { min-height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="screens/glass.jsx"></script>
<script type="text/babel" src="screens/shell.jsx"></script>
<script type="text/babel" src="screens/onboarding.jsx"></script>
<script type="text/babel" src="screens/quiz.jsx"></script>
<script type="text/babel" src="screens/result.jsx"></script>
<script type="text/babel" src="screens/home.jsx"></script>
<script type="text/babel" src="screens/chat.jsx"></script>
<script type="text/babel" src="screens/create.jsx"></script>
<script type="text/babel" src="screens/stats.jsx"></script>
<script type="text/babel" src="screens/misc.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

<script type="text/babel" data-presets="env,react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "dir": "tl",
  "blur": 20,
  "intensity": 1.6,
  "scale": 0.85,
  "hue": 22,
  "radius": 22,
  "startScreen": "onboarding",
  "font": "Mulish"
}/*EDITMODE-END*/;

function Root() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  // expose hue and radius via CSS vars (consumed by some glass styles indirectly via inline values)
  React.useEffect(() => {
    document.documentElement.style.setProperty('--pbt-hue', t.hue);
  }, [t.hue]);
  // Live font swap — the CSS var feeds every fontFamily across the app
  React.useEffect(() => {
    const stack = {
      'Mulish':  "'Mulish', 'Geist', system-ui, sans-serif",
      'Nunito':  "'Nunito', 'Geist', system-ui, sans-serif",
      'Geist':   "'Geist', system-ui, sans-serif",
    }[t.font] || "'Mulish', 'Geist', system-ui, sans-serif";
    document.documentElement.style.setProperty('--pbt-font', stack);
  }, [t.font]);
  return (
    <>
      <PBTApp initialRoute={t.startScreen} tweaks={t}/>
      <TweaksPanel title="Tweaks">
        <TweakSection label="Canvas">
          <TweakRadio label="Theme" value={t.theme}
            options={[{label:'Light', value:'light'},{label:'Dark', value:'dark'}]}
            onChange={(v) => setTweak('theme', v)}/>
          <TweakSelect label="Gradient direction" value={t.dir}
            options={[
              {label:'Top-left bloom', value:'tl'},
              {label:'Top-right bloom', value:'tr'},
              {label:'Bottom-left bloom', value:'bl'},
              {label:'Bottom-right bloom', value:'br'},
              {label:'Center bloom', value:'center'},
            ]}
            onChange={(v) => setTweak('dir', v)}/>
          <TweakSlider label="Bloom intensity" value={t.intensity} min={0.3} max={1.6} step={0.05}
            onChange={(v) => setTweak('intensity', v)}/>
        </TweakSection>
        <TweakSection label="Glass">
          <TweakSlider label="Blur intensity" value={t.blur} min={6} max={48} step={2} unit="px"
            onChange={(v) => setTweak('blur', v)}/>
          <TweakSlider label="Type scale" value={t.scale} min={0.85} max={1.15} step={0.01}
            onChange={(v) => setTweak('scale', v)}/>
        </TweakSection>
        <TweakSection label="Type">
          <TweakRadio label="Body font" value={t.font}
            options={[
              {label:'Mulish', value:'Mulish'},
              {label:'Nunito', value:'Nunito'},
              {label:'Geist',  value:'Geist'},
            ]}
            onChange={(v) => setTweak('font', v)}/>
        </TweakSection>
        <TweakSection label="Jump to screen">
          <TweakSelect label="Start" value={t.startScreen}
            options={[
              {label:'Onboarding', value:'onboarding'},
              {label:'ECHO Quiz', value:'quiz'},
              {label:'Driver Result', value:'result'},
              {label:'Home', value:'home'},
              {label:'Create scenario', value:'create'},
              {label:'Chat (live)', value:'chat'},
              {label:'Session stats', value:'stats'},
              {label:'History', value:'history'},
              {label:'Pet Analyzer', value:'analyzer'},
              {label:'Library', value:'resources'},
              {label:'Settings', value:'settings'},
            ]}
            onChange={(v) => setTweak('startScreen', v)}/>
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
</body>
</html>
